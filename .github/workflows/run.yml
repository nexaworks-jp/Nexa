name: AI Company Auto Run

on:
  schedule:
    # 3時間ごとに実行（8つのランダム投稿窓 → 毎日異なる時間帯に分散）
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      force_content:
        description: '記事を強制生成する（時間帯に関係なく）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-ai-company:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Cloudflareファイル変更チェック
        id: cf_check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- wrangler.toml analytics-worker/ line-worker/ 2>/dev/null | wc -l)
          if [ "$CHANGED" -gt "0" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "CF deploy: YES (変更あり or 手動実行)"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "CF deploy: SKIP (変更なし)"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: スケジュールチェック
        id: schedule_check
        run: |
          python3 -c "
          import hashlib, datetime, os
          now = datetime.datetime.utcnow()
          today = datetime.date.today().isoformat()
          seed = int(hashlib.md5(today.encode()).hexdigest(), 16)
          content_hour = [18, 21, 0][seed % 3]
          casual_hours = [h for i, h in enumerate([6, 9, 12]) if (seed >> (i + 4)) & 1]
          if not casual_hours:
              casual_hours = [[6, 9, 12][seed % 3]]
          diary_hour = 3
          active_hours = set(casual_hours + [content_hour, diary_hour])
          hour = now.hour
          print(f'Current UTC hour: {hour}, Active hours: {sorted(active_hours)}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'active={\"true\" if hour in active_hours else \"false\"}\n')
          "

      - name: Install Playwright browsers
        if: steps.schedule_check.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        run: playwright install chromium --with-deps

      - name: Create config.json from secrets
        if: steps.schedule_check.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cat > config.json << 'EOF'
          {
            "anthropic_api_key": "${{ secrets.ANTHROPIC_API_KEY }}",
            "note": {
              "email": "${{ secrets.NOTE_EMAIL }}",
              "password": "${{ secrets.NOTE_PASSWORD }}"
            },
            "x_twitter": {
              "api_key": "${{ secrets.X_API_KEY }}",
              "api_secret": "${{ secrets.X_API_SECRET }}",
              "access_token": "${{ secrets.X_ACCESS_TOKEN }}",
              "access_token_secret": "${{ secrets.X_ACCESS_TOKEN_SECRET }}",
              "bearer_token": "${{ secrets.X_BEARER_TOKEN }}"
            },
            "line": {
              "channel_access_token": "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}",
              "channel_secret": "${{ secrets.LINE_CHANNEL_SECRET }}",
              "user_id": "${{ secrets.LINE_USER_ID }}"
            },
            "amazon_associate": {
              "tag": "${{ secrets.AMAZON_ASSOCIATE_TAG }}"
            },
            "settings": {
              "dry_run": false,
              "note_post_per_day": 4,
              "x_post_per_day": 1,
              "note_auto_post": true,
              "primary_niche": "AI活用術・副業・節約",
              "language": "ja"
            }
          }
          EOF

      - name: Create note cookies file
        if: steps.schedule_check.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        env:
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
        run: |
          if [ -n "$NOTE_COOKIES" ]; then
            echo "$NOTE_COOKIES" > note_cookies.json
            echo "note_cookies.json を作成しました"
          else
            echo "NOTE_COOKIES シークレット未設定 → フォームログインを使用"
          fi

      - name: Run social learning (Sofia - Monday 6JST only)
        if: steps.schedule_check.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)  # 1=月曜〜7=日曜
          if [ "$DOW" = "1" ] && [ "$HOUR" = "21" ] || [ "${{ github.event.inputs.force_content }}" = "true" ]; then
            python3 -c "import json, sys; sys.path.insert(0, '.'); from workers import social_learner; config = json.load(open('config.json')); social_learner.run(config)"
          else
            echo "Social learning runs on Monday 6 JST (21 UTC). Current: DOW=${DOW} ${HOUR} UTC. Skipping."
          fi

      - name: Run AI Company
        if: steps.schedule_check.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.force_content }}" = "true" ]; then
            python main.py --force-content
          else
            python main.py
          fi

      - name: Commit updated memory and proposal files
        if: steps.schedule_check.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "ai-company[bot]@users.noreply.github.com"
          git config --local user.name "AI Company Bot"
          # 生成ファイルをバックアップ
          cp -r memory/ /tmp/ai_memory/ 2>/dev/null || true
          cp -r proposals/ /tmp/ai_proposals/ 2>/dev/null || true
          cp -r docs/ /tmp/ai_docs/ 2>/dev/null || true
          cp -r drafts/ /tmp/ai_drafts/ 2>/dev/null || true
          # 最新のorigin/mainにリセット
          git fetch origin main
          git reset --hard origin/main
          # バックアップから復元
          cp -r /tmp/ai_memory/. memory/ 2>/dev/null || true
          cp -r /tmp/ai_proposals/. proposals/ 2>/dev/null || true
          cp -r /tmp/ai_docs/. docs/ 2>/dev/null || true
          cp -r /tmp/ai_drafts/. drafts/ 2>/dev/null || true
          # コミット＆プッシュ
          git add memory/ proposals/ docs/ drafts/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 AI Company run $(date +'%Y-%m-%d %H:%M')"
          git push origin main

      - name: Deploy to Cloudflare Workers
        if: steps.cf_check.outputs.changed == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Setup Analytics KV namespace
        if: steps.cf_check.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # KVネームスペース「nexa_analytics」を作成（既存なら取得）
          CREATE_RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"nexa_analytics"}')
          KV_ID=$(echo "$CREATE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['id'])" 2>/dev/null || echo "")
          if [ -z "$KV_ID" ]; then
            # 作成失敗 → 既存のネームスペースから取得
            LIST_RESP=$(curl -s \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            KV_ID=$(echo "$LIST_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); ns=[n['id'] for n in d.get('result',[]) if n.get('title')=='nexa_analytics']; print(ns[0] if ns else '')" 2>/dev/null || echo "")
          fi
          echo "Analytics KV ID: $KV_ID"
          if [ -n "$KV_ID" ]; then
            sed -i "s/PLACEHOLDER_KV_ID/$KV_ID/" analytics-worker/wrangler.toml
            echo "CF_ANALYTICS_KV_ID=$KV_ID" >> $GITHUB_ENV
          else
            echo "WARNING: KV namespace の取得に失敗しました"
          fi

      - name: Deploy Analytics Worker
        if: steps.cf_check.outputs.changed == 'true' && env.CF_ANALYTICS_KV_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd analytics-worker && npx wrangler deploy

      - name: Notify LINE on failure
        if: failure()
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"to\": \"${{ secrets.LINE_USER_ID }}\", \"messages\": [{\"type\": \"text\", \"text\": \"⚠️ Nexa エラー発生\n\nワークフロー: run.yml\n時刻: $(date +'%Y-%m-%d %H:%M') UTC\n\n詳細はGitHub Actionsで確認してください。\nhttps://github.com/${{ github.repository }}/actions\"}]}"
