name: AI Company Auto Run

on:
  schedule:
    # 毎日 6:00, 12:00, 18:00, 22:00 JST (UTC+9) に実行
    - cron: '0 21,3,9,13 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  run-ai-company:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create config.json from secrets
        run: |
          cat > config.json << 'EOF'
          {
            "anthropic_api_key": "${{ secrets.ANTHROPIC_API_KEY }}",
            "note": {
              "email": "${{ secrets.NOTE_EMAIL }}",
              "password": "${{ secrets.NOTE_PASSWORD }}"
            },
            "x_twitter": {
              "api_key": "${{ secrets.X_API_KEY }}",
              "api_secret": "${{ secrets.X_API_SECRET }}",
              "access_token": "${{ secrets.X_ACCESS_TOKEN }}",
              "access_token_secret": "${{ secrets.X_ACCESS_TOKEN_SECRET }}",
              "bearer_token": "${{ secrets.X_BEARER_TOKEN }}"
            },
            "line": {
              "channel_access_token": "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}",
              "channel_secret": "${{ secrets.LINE_CHANNEL_SECRET }}",
              "user_id": "${{ secrets.LINE_USER_ID }}"
            },
            "amazon_associate": {
              "tag": "${{ secrets.AMAZON_ASSOCIATE_TAG }}"
            },
            "settings": {
              "dry_run": false,
              "note_post_per_day": 2,
              "x_post_per_day": 8,
              "primary_niche": "AI活用術・副業・節約",
              "language": "ja"
            }
          }
          EOF

      - name: Run AI Company
        run: python main.py

      - name: Commit updated memory and proposal files
        run: |
          git config --local user.email "ai-company[bot]@users.noreply.github.com"
          git config --local user.name "AI Company Bot"
          git fetch origin main
          git reset --soft origin/main
          git add memory/
          git add proposals/ 2>/dev/null || true
          git add drafts/ 2>/dev/null || true
          git add docs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 AI Company run $(date +'%Y-%m-%d %H:%M')"
          git push origin main

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
